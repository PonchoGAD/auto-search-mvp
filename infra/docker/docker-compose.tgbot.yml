services:
  bot-postgres:
    image: postgres:16-alpine
    container_name: auto-search-bot-postgres
    restart: unless-stopped
    env_file:
      - .env.tgbot
    environment:
      POSTGRES_DB: ${BOT_POSTGRES_DB:-auto_search_bot}
      POSTGRES_USER: ${BOT_POSTGRES_USER:-bot}
      POSTGRES_PASSWORD: ${BOT_POSTGRES_PASSWORD}
    volumes:
      - bot_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${BOT_POSTGRES_USER:-bot} -d ${BOT_POSTGRES_DB:-auto_search_bot} -h 127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - bot_internal
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  bot-api-migrate:
    build:
      context: ../../
      dockerfile: apps/bot_api/Dockerfile
    container_name: auto-search-bot-api-migrate
    restart: "no"
    env_file:
      - .env.tgbot
    depends_on:
      bot-postgres:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]
    networks:
      - bot_internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  bot-api:
    build:
      context: ../../
      dockerfile: apps/bot_api/Dockerfile
    container_name: auto-search-bot-api
    restart: unless-stopped
    env_file:
      - .env.tgbot
    depends_on:
      bot-postgres:
        condition: service_healthy
      bot-api-migrate:
        condition: service_completed_successfully
    expose:
      - "8100"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8100/api/v1/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - bot_internal
      - shared
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  tg-bot:
    build:
      context: ../../
      dockerfile: apps/bot/Dockerfile
    container_name: auto-search-tg-bot
    restart: unless-stopped
    env_file:
      - .env.tgbot
    depends_on:
      bot-api:
        condition: service_healthy
    networks:
      - bot_internal
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  worker:
    build:
      context: ../../
      dockerfile: apps/worker/Dockerfile
    container_name: auto-search-worker
    restart: unless-stopped
    env_file:
      - .env.tgbot
    depends_on:
      bot-api:
        condition: service_healthy
    networks:
      - bot_internal
      - shared
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  bot_postgres_data:

networks:
  bot_internal:
    driver: bridge
  shared:
    name: auto-search-shared
    external: true
