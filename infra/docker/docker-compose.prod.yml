version: "3.9"

services:
  api:
    build:
      context: ../../
      dockerfile: infra/docker/api.Dockerfile
    container_name: auto-search-api
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env.prod
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - internal

  ingest-worker:
    build:
      context: ../../
      dockerfile: apps/ingest-worker/Dockerfile
    container_name: auto-search-ingest-worker
    restart: always
    env_file:
      - .env.prod
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - internal

  postgres:
    image: postgres:16-alpine
    container_name: auto-search-postgres
    restart: always
    environment:
      POSTGRES_DB: auto_search
      POSTGRES_USER: auto
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?err}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auto -d auto_search -h 127.0.0.1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: auto-search-redis
    restart: always
    command: ["redis-server", "--protected-mode", "yes", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - internal

  qdrant:
    image: qdrant/qdrant:v1.10.1
    container_name: auto-search-qdrant
    restart: always
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: auto-search-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - internal
    
volumes:
  postgres_data:
  qdrant_data:

networks:
  internal:
    driver: bridge